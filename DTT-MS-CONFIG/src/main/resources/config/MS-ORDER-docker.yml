spring:
  datasource:
    username: ${DB_ORDER_USER}
    password: ${DB_ORDER_PASSWORD}
    url: jdbc:postgresql://${DB_ORDER_URL}:5432/${DB_ORDER_DATABASE}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      keepalive-time: 30000
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${MS_AUTH}:${AUTH_PORT}/.well-known/jwks.json
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
api:
  logic: ${URL_API_CATALOG}
  mp: ${URL_API_MERCADO_PAGO}